<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Mis 38 Años! ⚽🔥</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --accent-green: #4caf50;
            --accent-orange: #ff5722;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .invitation-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 100%;
            padding: 30px;
            text-align: center;
            border: 2px solid var(--accent-green);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
            color: var(--text-color);
        }

        .age {
            font-size: 4rem;
            font-weight: bold;
            color: var(--accent-orange);
            margin: 0;
            line-height: 1;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 30px;
        }

        .details {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: left;
        }

        .detail-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .detail-item:last-child {
            margin-bottom: 0;
        }

        .icon {
            font-size: 1.5rem;
            margin-right: 15px;
            width: 30px;
            text-align: center;
        }

        .agenda {
            border-top: 1px solid #444;
            padding-top: 20px;
            margin-top: 20px;
        }

        .agenda h3 {
            color: var(--accent-green);
            margin-bottom: 15px;
        }

        .timeline {
            font-weight: bold;
            color: var(--accent-orange);
        }

        .btn-confirm {
            display: inline-block;
            background-color: var(--accent-green);
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: background 0.3s ease;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
            margin-top: 15px;
        }

        .btn-confirm:hover {
            background-color: #43a047;
        }
    </style>
</head>
<body>

    <div class="invitation-card">
        <h1>¡Festejo Mis!</h1>
        <p class="age">38</p>
        <p class="subtitle">Se viene una gran tarde de amigos, fútbol y brasas.</p>

        <div class="details">
            <div class="detail-item">
                <span class="icon">📅</span>
                <div><strong>Día:</strong> Jueves 9 de Julio (Feriado)</div>
            </div>
            <div class="detail-item">
                <span class="icon">📍</span>
                <div><strong>Lugar:</strong> Club Aire Puro</div>
            </div>
        </div>

        <div class="agenda">
            <h3>Cronograma de la Fecha 🏆</h3>
            <div class="detail-item">
                <span class="icon">⚽</span>
                <div><span class="timeline">16:00 hs</span> - Se juega la pelota (puntualidad europea).</div>
            </div>
            <div class="detail-item">
                <span class="icon">🔥</span>
                <div><span class="timeline">Luego...</span> - Asadito en el quincho para recuperar energías.</div>
            </div>
        </div>

        <!-- Podés cambiar el link de abajo por el tuyo de WhatsApp para que te confirmen directo -->
        <a href="https://wa.me/?text=¡Confirmadísimo para el 9 de Julio! ⚽🔥" target="_blank" class="btn-confirm">
            Confirmar Asistencia
        </a>
    </div>

</body>
</html>
